name: Deploy production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy TYPO3 to production
    runs-on: ubuntu-24.04
    environment: production

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_PHP: ${{ secrets.DEPLOY_PHP || 'php' }}
      DEPLOY_COMPOSER: ${{ secrets.DEPLOY_COMPOSER || 'composer' }}
      KEEP_RELEASES: ${{ secrets.KEEP_RELEASES || '5' }}
      TYPO3_SETTINGS_PHP_B64: ${{ secrets.TYPO3_SETTINGS_PHP_B64 }}
      TYPO3_ADDITIONAL_PHP_B64: ${{ secrets.TYPO3_ADDITIONAL_PHP_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Validate Composer metadata
        run: composer validate --strict --no-check-publish

      - name: Install deployment dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --optimize-autoloader

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload shared TYPO3 config from secrets
        if: env.TYPO3_SETTINGS_PHP_B64 != ''
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH/shared/config/system'"
          printf '%s' "$TYPO3_SETTINGS_PHP_B64" | base64 --decode | ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "cat > '$DEPLOY_PATH/shared/config/system/settings.php'"
          if [ -n "$TYPO3_ADDITIONAL_PHP_B64" ]; then
            printf '%s' "$TYPO3_ADDITIONAL_PHP_B64" | base64 --decode | ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "cat > '$DEPLOY_PATH/shared/config/system/additional.php'"
          fi

      - name: Deploy atomic release
        run: php vendor/deployer/deployer/bin/dep deploy production -f Build/deploy.php --no-interaction
