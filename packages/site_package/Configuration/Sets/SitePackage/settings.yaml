
page:
  pageview:
    paths: 'EXT:site_package/Resources/Private/PageView/'

  analytics:
    googleMeasurementId: 'G-JER0SPQ2N4'

  meta:
    viewport: 'width=device-width, initial-scale=1'
    robots: 'index,follow'
    apple-mobile-web-app-capable: 'no'
    compatible: 'IE=edge'

config:
  no_cache: '0'
  removeDefaultJS: '0'
  admPanel: '1'
  prefixLocalAnchors: 'all'
  headerComment: 'build by get.typo3.org/sitepackage'
  sendCacheHeaders: '1'
