<f:if condition="{data.header} || {data.bodytext}">
    <section class="seo-section">
        <div class="wrap">
            <f:if condition="{data.header}">
                <h2 class="reveal d1">{data.header}</h2>
            </f:if>
            <f:if condition="{data.bodytext}">
                <div class="seotext reveal d2"><f:format.html>{data.bodytext}</f:format.html></div>
            </f:if>
        </div>
    </section>
</f:if>
