<section id="kontakt" class="band center" data-shape="core" data-morph-shape="4">
    <div class="wrap">
        <p class="kicker reveal">Waldbyte</p>
        <f:if condition="{data.header}">
            <h2 class="reveal d1">{data.header}</h2>
        </f:if>
        <f:if condition="{data.bodytext}">
            <div class="sub reveal d2"><f:format.html>{data.bodytext}</f:format.html></div>
        </f:if>
        <div class="cta-btns reveal d3">
            <f:if condition="{data.cta_primary_label} && {data.cta_primary_link}">
                <f:link.typolink parameter="{data.cta_primary_link}" class="btn btn-primary">{data.cta_primary_label}</f:link.typolink>
            </f:if>
            <f:if condition="{data.cta_secondary_label} && {data.cta_secondary_link}">
                <f:link.typolink parameter="{data.cta_secondary_link}" class="btn btn-ghost">{data.cta_secondary_label}</f:link.typolink>
            </f:if>
        </div>
    </div>
</section>
